<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles/style.css">

  <title>Frontend Mentor | NFT preview card component</title>

</head>

<body>

  <main>
    <article class="card">
      <div class="card__img">
        <img src="./assets/images/image-equilibrium.jpg" alt="Equilibrium NFT">
      </div>
      <div class="card__content">
        <h1>Equilibrium #3429</h1>
        <p>Our Equilibrium collection promotes balance and calm.</p>
        <div class="card__pricetime">
          <span>0.041 ETH</span>
          <time datetime="P3D">3 days left</time>
        </div>
      </div>
      <div class="card__divisor"></div>
      <footer class="card__author">
        <img class="author__img" src="./assets/images/image-avatar.png" alt="Avatar of Jules Wyvern">
        <p>Creation of <span>Jules Wyvern</span></p>
      </footer>
    </article>
  </main>

    

</body>

</html>
